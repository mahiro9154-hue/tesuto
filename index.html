<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>GRAND CASINO - STEALTH ADMIN UPDATE</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <style>
        body { background-color: #0d0d0d; color: white; font-family: sans-serif; display: flex; justify-content: center; margin: 0; min-height: 100vh; overflow-x: hidden; }
        .game-outer { width: 100%; max-width: 450px; padding: 20px; }
        .logo { color: #f1c40f; text-shadow: 0 0 15px #f1c40f; text-align: center; font-size: 2.2rem; margin-bottom: 20px; cursor: pointer; user-select: none; }
        .login-box, .bank-box, .ranking-box { background: linear-gradient(145deg, #1a1a1a, #0d0d0d); border: 1px solid #333; border-radius: 20px; padding: 30px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        #lobby-screen, #bank-screen, #ranking-screen, #main-game { display: none; }
        .lobby-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; }
        .lobby-card { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 15px; text-align: center; cursor: pointer; transition: 0.3s; }
        .lobby-card:hover { border-color: #f1c40f; transform: translateY(-3px); }
        .card-icon { font-size: 1.8rem; display: block; margin-bottom: 5px; }
        .status-bar { display: flex; justify-content: space-between; background: #222; padding: 12px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #444; font-size: 0.8rem; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; background: #000; border: 1px solid #333; color: #fff; border-radius: 8px; box-sizing: border-box; }
        button { padding: 12px; background: #f1c40f; color: black; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; width: 100%; margin-bottom: 5px; }
        .track { background: #1b5e20; border: 3px solid #fff; border-radius: 10px; padding: 8px; margin-bottom: 15px; }
        .lane { height: 45px; border-bottom: 1px dashed rgba(255,255,255,0.1); position: relative; display: flex; align-items: center; }
        .runner-emoji { font-size: 1.6rem; position: absolute; left: 0; transition: left 0.1s linear; }
        .bet-area { position: absolute; right: 5px; font-size: 0.75rem; background: rgba(0,0,0,0.6); padding: 4px; border-radius: 4px; }
        .bet-area input { width: 60px; margin: 0; padding: 2px; text-align: center; }
        
        /* 管理者セクション（最初は隠す） */
        #admin-section { display: none; margin-top: 30px; padding: 15px; border: 2px dashed #8e44ad; border-radius: 10px; background: rgba(142, 68, 173, 0.1); }
        .admin-section h3 { font-size: 0.9rem; color: #8e44ad; margin-bottom: 10px; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="game-outer">
    <div id="login-screen">
        <h1 class="logo">💎 GRAND CASINO</h1>
        <div class="login-box">
            <input type="text" id="login-id" placeholder="ユーザーID">
            <input type="password" id="login-pw" placeholder="パスワード">
            <button onclick="handleLogin()">GAMES START</button>
        </div>
    </div>

    <div id="lobby-screen">
        <h1 class="logo" style="font-size:1.5rem;" onclick="toggleAdmin()">💎 SELECT GAME</h1>
        <div class="status-bar">
            <div>💰 Wallet: <span id="lobby-balance">0</span></div>
            <div style="color:#2ecc71;">🏦 Bank: <span id="lobby-savings">0</span></div>
        </div>
        <div class="lobby-grid">
            <div class="lobby-card" onclick="enterGame('keiba')"><span class="card-icon">🏇</span><h4>競馬</h4></div>
            <div class="lobby-card" onclick="enterGame('keirin')"><span class="card-icon">🚴</span><h4>競輪</h4></div>
            <div class="lobby-card" onclick="enterVip()"><span class="card-icon">👑</span><h4>VIP</h4></div>
            <div class="lobby-card" onclick="showBank()"><span class="card-icon">🏦</span><h4>BANK</h4></div>
            <div class="lobby-card" onclick="showRanking()" style="grid-column: span 2; border-color: #f1c40f;"><span class="card-icon">🏆</span><h4>RANKING</h4></div>
        </div>
        
        <div id="admin-section">
            <h3 style="color:#8e44ad;">Admin Gift System</h3>
            <input type="password" id="admin-code" placeholder="Secret Code">
            <input type="number" id="gift-amount-input" placeholder="配布額を入力">
            <button onclick="applyGift()" style="background:#8e44ad; color:white;">全員に配布実行</button>
        </div>

        <button onclick="logout()" style="background:none; color:#888; text-decoration:underline; margin-top:20px;">ログアウト</button>
    </div>

    <div id="ranking-screen">
        <h1 class="logo" style="font-size:1.5rem;">🏆 TOP PLAYERS</h1>
        <div class="ranking-box">
            <div id="rank-list" style="text-align:left; margin-bottom:20px;"></div>
            <button onclick="backToLobby()" style="background:#444; color:white;">ロビーに戻る</button>
        </div>
    </div>

    <div id="bank-screen">
        <h1 class="logo" style="font-size:1.5rem;">🏦 CASINO BANK</h1>
        <div class="bank-box">
            <p>Wallet: <span id="bank-wallet-display">0</span></p>
            <p style="color:#2ecc71;">Bank: <span id="bank-savings-display">0</span></p>
            <input type="number" id="bank-amount" placeholder="金額を入力">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <button onclick="processBank('deposit')">預ける</button>
                <button onclick="processBank('withdraw')">引き出す</button>
            </div>
            <button id="borrow-btn" onclick="borrowMoney()" style="margin-top:10px; background:#e67e22;">1,000 借りる</button>
            <button onclick="backToLobby()" style="background:#444; color:white; margin-top:10px;">戻る</button>
        </div>
    </div>

    <div id="main-game">
        <div class="status-bar">
            <div>💰 <span id="balance">0</span> GEMA</div>
            <button onclick="backToLobby()" style="width:auto; padding:5px 10px; background:#444; color:white;">ロビー</button>
        </div>
        <p id="bet-count-info" style="text-align:center; font-size:0.8rem; color:#f1c40f;">最大2頭まで賭けられるぜ！</p>
        <div class="track" id="race-track"></div>
        <button id="start-btn" onclick="runRace()">レース開始</button>
        <button id="reset-btn" onclick="resetGame()" style="display:none; margin-top:10px;">次へ</button>
        <div id="message" style="margin-top:10px; text-align:center; color:#f1c40f; font-weight:bold;"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA_FMQMuu5nCiUJLCpvJh59-IrXRK0uJBs",
        authDomain: "keiba-6600e.firebaseapp.com",
        projectId: "keiba-6600e",
        storageBucket: "keiba-6600e.firebasestorage.app",
        messagingSenderId: "679192770410",
        appId: "1:679192770410:web:cae56633faa1c282105713"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let userData = null;
    let horseStats = [];
    let gameMode = 'keiba';
    let adminClickCount = 0; // 管理者ボタン用

    async function handleLogin() {
        const id = document.getElementById('login-id').value.trim();
        const pw = document.getElementById('login-pw').value;
        if (!id || !pw) return alert("IDとパスワードを入れてくれ！");
        try {
            const doc = await db.collection('users').doc(id).get();
            const now = Date.now();
            if (doc.exists) {
                let data = doc.data();
                if (data.password !== pw) return alert("パスワードが違うぜ！");
                userData = { id, ...data };
                applyInterest(now);
            } else {
                userData = { id, password: pw, balance: 1000, savings: 0, lastUpdate: now };
                await db.collection('users').doc(id).set(userData);
            }
            await updateData();
            startTimer();
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('lobby-screen').style.display = 'block';
        } catch (e) { alert("通信エラーだ。"); }
    }

    // 【新機能】隠しメニュー表示
    function toggleAdmin() {
        adminClickCount++;
        if (adminClickCount >= 3) {
            const section = document.getElementById('admin-section');
            section.style.display = (section.style.display === 'block') ? 'none' : 'block';
            adminClickCount = 0; // リセット
        }
    }

    async function applyGift() {
        const code = document.getElementById('admin-code').value;
        const giftAmount = parseInt(document.getElementById('gift-amount-input').value);
        if (code !== "km778695") return alert("コードが違うぜ！");
        if (isNaN(giftAmount) || giftAmount <= 0) return alert("金額を入れて！");
        if (!confirm(`${giftAmount} 配布するぜ？`)) return;
        try {
            const usersSnap = await db.collection('users').get();
            const batch = db.batch();
            usersSnap.forEach(doc => {
                batch.update(doc.ref, { balance: (doc.data().balance || 0) + giftAmount });
            });
            await batch.commit();
            alert("配布完了！");
            document.getElementById('admin-code').value = "";
            document.getElementById('gift-amount-input').value = "";
            userData.balance += giftAmount;
            updateUI();
        } catch (e) { alert("失敗。"); }
    }

    // 以降、既存の関数（applyInterest, startTimer, updateData, updateUI, ranking, bank, race等）
    function applyInterest(now) {
        const last = userData.lastUpdate || now;
        const diffUnits = Math.floor((now - last) / 180000);
        if (diffUnits > 0) {
            if (userData.balance < 0) userData.balance = Math.floor(userData.balance * Math.pow(1.1, diffUnits));
            if (userData.savings > 0) userData.savings = Math.floor(userData.savings * Math.pow(1.01, diffUnits));
            alert("利息が反映されたぜ。");
        }
        userData.lastUpdate = now;
    }

    function startTimer() {
        setInterval(async () => {
            if (!userData) return;
            const now = Date.now();
            if (userData.balance < 0) userData.balance = Math.floor(userData.balance * 1.1);
            if (userData.savings > 0) userData.savings = Math.floor(userData.savings * 1.01);
            userData.lastUpdate = now;
            await updateData();
        }, 180000);
    }

    async function updateData() {
        if (!userData) return;
        await db.collection('users').doc(userData.id).update({
            balance: userData.balance,
            savings: userData.savings,
            lastUpdate: userData.lastUpdate
        });
        updateUI();
    }

    function updateUI() {
        if (!userData) return;
        const bDisp = userData.balance < 0 ? "ー" + Math.abs(userData.balance) : userData.balance;
        const sDisp = userData.savings;
        document.getElementById('lobby-balance').innerText = bDisp;
        document.getElementById('lobby-savings').innerText = sDisp;
        document.getElementById('balance').innerText = bDisp;
        if(document.getElementById('bank-wallet-display')) document.getElementById('bank-wallet-display').innerText = bDisp;
        if(document.getElementById('bank-savings-display')) document.getElementById('bank-savings-display').innerText = sDisp;
    }

    async function showRanking() {
        document.getElementById('lobby-screen').style.display = 'none';
        document.getElementById('ranking-screen').style.display = 'block';
        const listEl = document.getElementById('rank-list');
        listEl.innerHTML = "読込中...";
        const snap = await db.collection('users').orderBy('balance', 'desc').limit(10).get();
        let html = "";
        let i = 1;
        snap.forEach(doc => {
            const d = doc.data();
            html += `<div style="display:flex; justify-content:space-between; padding:5px; border-bottom:1px solid #333;">
                        <span>${i++}. ${doc.id}</span><span>${d.balance} G</span>
                     </div>`;
        });
        listEl.innerHTML = html;
    }

    async function processBank(type) {
        const val = parseInt(document.getElementById('bank-amount').value);
        if (!val || val <= 0) return alert("金額を入れて！");
        if (type === 'deposit') {
            if (userData.balance < val) return alert("金が足りない！");
            userData.balance -= val; userData.savings += val;
        } else {
            if (userData.savings < val) return alert("貯金が足りない！");
            userData.balance += val; userData.savings -= val;
        }
        await updateData();
        document.getElementById('bank-amount').value = "";
    }

    async function borrowMoney() {
        if (userData.balance > 0) return alert("まだあるだろ！");
        userData.balance -= 1000;
        await updateData();
    }

    function checkBetLimit(inputEl) {
        let activeBets = 0;
        for (let i = 1; i <= 5; i++) {
            let el = document.getElementById(`bet${i}`);
            if (el && el.value && parseInt(el.value) > 0) activeBets++;
        }
        if (activeBets > 2) {
            alert("2頭までにしてくれ！");
            inputEl.value = "";
        }
    }

    function backToLobby() {
        ['bank-screen', 'ranking-screen', 'main-game'].forEach(id => document.getElementById(id).style.display = 'none');
        document.getElementById('lobby-screen').style.display = 'block';
        updateUI();
    }

    function showBank() { document.getElementById('lobby-screen').style.display = 'none'; document.getElementById('bank-screen').style.display = 'block'; updateUI(); }
    function enterGame(mode) { gameMode = mode; document.getElementById('lobby-screen').style.display = 'none'; document.getElementById('main-game').style.display = 'block'; loadRaceStats(); }
    function enterVip() { if (userData.balance < 1000000) return alert("100万貯めな！"); enterGame('vip'); }

    async function loadRaceStats() {
        const track = document.getElementById('race-track');
        track.innerHTML = ""; horseStats = [];
        for (let i = 1; i <= 5; i++) {
            const emoji = gameMode === 'keirin' ? '🚴' : '🏇';
            let odds = gameMode === 'vip' ? (500 + Math.random() * 200).toFixed(0) : (gameMode === 'keirin' ? (8.0 + (Math.random() * 10 - 5)).toFixed(1) : (4.0 + (Math.random() * 4 - 2)).toFixed(1));
            horseStats.push({ id: i, odds: odds });
            track.innerHTML += `<div class="lane"><span class="runner-emoji" id="runner${i}">${emoji}${i}</span><div class="bet-area"><span>${odds}x</span><input type="number" id="bet${i}" placeholder="0" oninput="checkBetLimit(this)"></div></div>`;
        }
    }

    async function runRace() {
        const bets = [1,2,3,4,5].map(i => parseInt(document.getElementById(`bet${i}`).value) || 0);
        const total = bets.reduce((a, b) => a + b, 0);
        if (total <= 0) return alert("賭けて！");
        if (userData.balance < total) return alert("金が足りないぜ！");
        userData.balance -= total; updateUI();
        document.getElementById('start-btn').disabled = true;
        let pos = [0,0,0,0,0];
        const interval = setInterval(async () => {
            let winner = null;
            for(let i=0; i<5; i++) {
                pos[i] += Math.random() * (gameMode === 'vip' ? 8 : 4.5);
                document.getElementById(`runner${i+1}`).style.left = Math.min(pos[i], 82) + "%";
                if (pos[i] >= 82 && !winner) winner = i + 1;
            }
            if (winner) {
                clearInterval(interval);
                const payout = Math.floor(bets[winner-1] * horseStats[winner-1].odds);
                userData.balance += payout;
                await updateData();
                document.getElementById('message').innerText = `${winner}号の勝利！ ${payout}獲得！`;
                document.getElementById('reset-btn').style.display = 'block';
            }
        }, 50);
    }

    function resetGame() { document.getElementById('start-btn').disabled = false; document.getElementById('reset-btn').style.display = 'none'; document.getElementById('message').innerText = ""; loadRaceStats(); }
    
    function logout() {
        userData = null;
        ['lobby-screen', 'bank-screen', 'ranking-screen', 'main-game'].forEach(id => document.getElementById(id).style.display = 'none');
        document.getElementById('login-screen').style.display = 'block';
        document.getElementById('login-id').value = "";
        document.getElementById('login-pw').value = "";
        adminClickCount = 0; // ログアウトしたらクリック数もリセット
    }
</script>
</body>
</html>

<script>// ログアウト関数の修正
function logout() {
    // 1. ユーザーデータを消去
    userData = null;
    
    // 2. 全ての画面を隠す
    document.getElementById('lobby-screen').style.display = 'none';
    document.getElementById('bank-screen').style.display = 'none';
    document.getElementById('ranking-screen').style.display = 'none';
    document.getElementById('main-game').style.display = 'none';
    
    // 3. ログイン画面を表示
    document.getElementById('login-screen').style.display = 'block';
    
    // 4. 入力欄をクリア
    document.getElementById('login-id').value = "";
    document.getElementById('login-pw').value = "";
    
    // 5. 不要であればタイマーも止める
    // もし clearInterval を使っているならここで停止する処理を入れる
}
//# sourceURL=userscript.js
</script>
</body>
</html>
